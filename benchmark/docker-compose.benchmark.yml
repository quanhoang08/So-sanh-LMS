services:
  # =====================
  #  MONOLITHIC STACK
  # =====================
  monolith:
    build:
      context: ../LMS-monolithic
      dockerfile: Dockerfile
    container_name: benchmark_download_monolith
    # No host port exposure needed; benchmark-router routes internally.
    env_file:
      - ../LMS-monolithic/.env
    environment:
      DB_HOST: monolith-db
      DB_PORT: 5432
      DB_USERNAME: postgres
      DB_PASSWORD: 123456
      DB_NAME: LMS-monolithic
    depends_on:
      monolith-db:
        condition: service_healthy
    networks:
      - benchmark-download-net

  monolith-db:
    image: postgres:15-alpine
    container_name: benchmark_download_monolith_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456
      POSTGRES_DB: LMS-monolithic
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d LMS-monolithic"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - benchmark-download-net

  # =====================
  #  MICROSERVICES STACK
  # =====================
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: benchmark_download_rabbitmq
    environment:
      - RABBITMQ_ERLANG_COOKIE=LMS_SECRET_COOKIE
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - benchmark-download-net

  academic-db:
    image: postgres:15-alpine
    container_name: benchmark_download_academic_db
    environment:
      POSTGRES_DB: lms_academic
      POSTGRES_PASSWORD: 123456
    volumes:
      - academic_pgdata:/var/lib/postgresql/data
      - ../LMS-microservice/AcademicService/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d lms_academic"]
      interval: 5s
      retries: 5
    networks:
      - benchmark-download-net

  academic-service:
    build:
      context: ../LMS-microservice/AcademicService
      dockerfile: Dockerfile
    container_name: benchmark_download_academic_service
    env_file:
      - ../LMS-microservice/AcademicService/.env
    depends_on:
      academic-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - benchmark-download-net

  account-db:
    image: postgres:15-alpine
    container_name: benchmark_download_account_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456
      POSTGRES_DB: accounts_db
    volumes:
      - account_pgdata:/var/lib/postgresql/data
      - ../LMS-microservice/AccountService/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d accounts_db"]
      interval: 10s
      retries: 5
    networks:
      - benchmark-download-net

  account-service:
    build:
      context: ../LMS-microservice/AccountService
      dockerfile: Dockerfile
    container_name: benchmark_download_account_service
    env_file:
      - ../LMS-microservice/AccountService/.env
    ports:
      - "3101:3001"
    depends_on:
      account-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - benchmark-download-net

  course-db:
    image: postgres:15-alpine
    container_name: benchmark_download_course_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456
      POSTGRES_DB: course_db
    volumes:
      - course_pgdata:/var/lib/postgresql/data
      - ../LMS-microservice/CourseService/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d course_db"]
      interval: 10s
      retries: 5
    networks:
      - benchmark-download-net

  course-service:
    build:
      context: ../LMS-microservice/CourseService
      dockerfile: Dockerfile
    container_name: benchmark_download_course_service
    env_file:
      - ../LMS-microservice/CourseService/.env
    ports:
      - "3202:3002"
    depends_on:
      course-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - benchmark-download-net

  api-gateway:
    image: nginx:alpine
    container_name: benchmark_download_api_gateway
    # No host port exposure needed; benchmark-router routes internally.
    volumes:
      - ../LMS-microservice/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - account-service
      - academic-service
      - course-service
    networks:
      - benchmark-download-net

  benchmark-router:
    image: nginx:alpine
    container_name: benchmark_download_router
    ports:
      # Unified benchmark entrypoint for both architectures
      - "5000:80"
    volumes:
      - ./nginx.benchmark-router.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - monolith
      - api-gateway
    networks:
      - benchmark-download-net

networks:
  benchmark-download-net:
    driver: bridge

volumes:
  academic_pgdata:
  account_pgdata:
  course_pgdata:
